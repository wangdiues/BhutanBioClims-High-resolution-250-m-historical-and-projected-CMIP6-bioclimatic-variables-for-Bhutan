# GitHub Actions CI for R package checking
name: R-CMD-check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  R-CMD-check:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
      
      - name: Install system dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::terra
      
      - name: Check R script syntax
        run: |
          Rscript -e "parse('10_scripts/r/bioclim_master.R')"
        shell: bash
      
      - name: Test script help
        run: |
          Rscript 10_scripts/r/bioclim_master.R --help
        shell: bash
      
      - name: Run end-to-end smoke test
        run: |
          Rscript .github/scripts/smoke_test.R
        shell: bash

